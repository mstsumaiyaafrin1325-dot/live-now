<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumaiya Afrin - LIVE NOW</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #f0f2f5; margin: 0; padding: 0; }
        .card { width: 90%; max-width: 400px; margin: 60px auto; background: white; padding: 30px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .profile-img { width: 110px; height: 110px; border-radius: 50%; border: 4px solid #ff4b2b; object-fit: cover; margin-bottom: 15px; }
        h2 { color: #333; margin-bottom: 5px; }
        p { color: #666; font-size: 15px; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff416c; }
        button { width: 100%; padding: 15px; background: linear-gradient(to right, #ff416c, #ff4b2b); color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 17px; font-weight: bold; transition: 0.3s; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        .live-badge { background: #ff0000; color: white; padding: 2px 8px; border-radius: 5px; font-size: 12px; vertical-align: middle; margin-left: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.4;} 100% {opacity: 1;} }
    </style>
</head>
<body>

<div class="card">
    <img src="received_1748447966512537.jpeg" alt="Sumaiya Afrin" class="profile-img">
    
    <h2 id="title">🔴 Sumaiya Afrin <span class="live-badge">LIVE</span></h2>
    <p id="msg">নম্বর দিয়ে ভিডিও কল শুরু করুন</p>

    <form id="mainForm">
        <div id="step1">
            <input type="tel" id="phone" placeholder="আপনার মোবাইল নম্বর" required>
            <button type="button" onclick="goToStep2()">পরবর্তী ধাপ</button>
        </div>

        <div id="step2" style="display:none;">
            <input type="tel" id="otp" placeholder="৪ ডিজিট কোড (OTP)" required>
            <button type="submit">ভিডিও কল শুরু করুন ✅</button>
        </div>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
